<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Calculadora fetch</title>
  <link rel="stylesheet" href="estilos.css">
</head>

<body>

  <main>

    <div class="fondo">
    <h1>Calculadora</h1>
    <form id="form-calcu">

      <input
        type="number"
        name="num1"
        id="num1"
        placeholder="Primer número"
        step="any"
        required
      >

      <select name="op" id="op">
        <option value="suma">+ Suma</option>
        <option value="resta">− Resta</option>
        <option value="multiplicacion">× Multiplicación</option>
        <option value="division">÷ División</option>
      </select>

      <input
        type="number"
        name="num2"
        id="num2"
        placeholder="Segundo número"
        step="any"
        required
      >

      <div class="cont">
        <button type="submit" id="boton-calcu">
          Calcular
        </button>
        <div class="brillo"></div>
      </div>

    </form>

    <!-- Zona de resultado -->
    <div id="zona-resultado" class="oculto">
      <div id="operacion"></div>
      <div id="resultado"></div>
    </div>

    <!-- Zona de error -->
    <div id="zona-error" class="oculto">
      <p id="mensaje-error"></p>
    </div>
    </div>

  </main>

  <script src="app.js"></script>

</body>
</html>
